name: Package clean install version

on:
  push:
    paths:
      - '.github/workflows/package-clean-install.yml'
  pull_request:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove custom install banner and build version 0.19
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def read(path):
              return Path(path).read_text(encoding="utf-8")

          def write(path, text):
              Path(path).write_text(text, encoding="utf-8")

          index = read("index.html")
          index = re.sub(r'\n\s*<aside id="installBanner".*?</aside>\s*', '\n', index, flags=re.S)
          index = re.sub(r'\n\s*<button id="installButton"[^>]*>.*?</button>', '', index, flags=re.S)
          index = re.sub(r'\n\s*<dialog id="installHelpDialog".*?</dialog>\s*', '\n', index, flags=re.S)
          index = re.sub(r'\n\s*<script src="\./native-install\.js[^\"]*"></script>', '', index)
          index = index.replace("wersja 0.18", "wersja 0.19")
          index = index.replace("styles.css?v=18", "styles.css?v=19")
          index = index.replace("recipes.js?v=18", "recipes.js?v=19")
          index = index.replace("app.js?v=18", "app.js?v=19")
          write("index.html", index)

          app = read("app.js")
          for name in [
              "installButton", "installBanner", "installActionButton",
              "installDismissButton", "installHelpDialog", "installHelpBody",
              "closeInstallHelpDialog"
          ]:
              app = re.sub(rf'^const {name} = .*?;\n', '', app, flags=re.M)
          app = re.sub(r'^let deferredPrompt = null;\n', '', app, flags=re.M)
          app = re.sub(
              r'\nfunction isStandaloneMode\(\) \{.*?\nif \("serviceWorker" in navigator\) \{',
              '\nif ("serviceWorker" in navigator) {',
              app,
              flags=re.S
          )
          app = re.sub(r'\nupdateInstallVisibility\(\);\s*$', '\n', app)
          app = app.replace('./sw.js?v=18', './sw.js?v=19')
          app = app.replace('dobreJedzenieReloadedV18', 'dobreJedzenieReloadedV19')
          write("app.js", app)

          styles = read("styles.css")
          styles = re.sub(r'\n\s*/\* v18: instalacja jako prawdziwa aplikacja PWA \*/.*$', '\n', styles, flags=re.S)
          write("styles.css", styles)

          sw = read("sw.js")
          sw = sw.replace('dobre-jedzenie-v18', 'dobre-jedzenie-v19')
          sw = sw.replace('styles.css?v=18', 'styles.css?v=19')
          sw = sw.replace('recipes.js?v=18', 'recipes.js?v=19')
          sw = sw.replace('app.js?v=18', 'app.js?v=19')
          write("sw.js", sw)

          readme = Path("README.md")
          if readme.exists():
              text = readme.read_text(encoding="utf-8")
              text = re.sub(r'\n## Instalacja jako aplikacja\n.*$', '\n', text, flags=re.S)
              readme.write_text(text, encoding="utf-8")

          Path("native-install.js").unlink(missing_ok=True)

          checks = {
              "index.html": ["installBanner", "installHelpDialog", "installButton"],
              "app.js": ["beforeinstallprompt", "updateInstallVisibility", "deferredPrompt"],
          }
          for path, forbidden in checks.items():
              text = read(path)
              found = [item for item in forbidden if item in text]
              if found:
                  raise SystemExit(f"{path}: pozostały elementy instalacyjne: {found}")
          PY

      - name: Build downloadable folder
        shell: bash
        run: |
          rm -rf Dobre-jedzenie-0.19 Dobre-jedzenie-0.19.zip
          mkdir Dobre-jedzenie-0.19
          shopt -s dotglob
          for item in *; do
            case "$item" in
              .git|.github|Dobre-jedzenie-0.19|Dobre-jedzenie-0.19.zip) continue ;;
            esac
            cp -R "$item" Dobre-jedzenie-0.19/
          done
          zip -r Dobre-jedzenie-0.19.zip Dobre-jedzenie-0.19

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Dobre-jedzenie-0.19
          path: Dobre-jedzenie-0.19.zip
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
